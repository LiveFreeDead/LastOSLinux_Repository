000423,|,F,|,LLApp,|,T,|,,|,False,|,False,|,False,|,,|,,|,,|,Mission Center (Flatpak),|,v1.0,|,System;,|,Monitor your CPU, Memory, Disk, Network and GPU usageFeatures:Monitor overall or per-thread CPU usageSee system process, thread, and handle count, uptime, clock speed (base and current), cache sizesMonitor RAM and Swap usageSee a breakdown how the memory is being used by the systemMonitor Disk utilization and transfer ratesMonitor network utilization and transfer speedsSee network interface information such as network card name, connection type (Wi-Fi or Ethernet), wireless speeds and frequency, hardware address, IP addressMonitor overall GPU usage, video encoder and decoder usage, memory usage and power consumption, powered by the popular NVTOP projectSee a breakdown of resource usage by app and processSupports a minified summary view for simple monitoringUse hardware accelerated rendering for all the graphs in an effort to reduce CPU and overall resource usageUses GTK4 and LibadwaitaWritten in RustLimitations (there is ongoing work to overcome all of these):No per-process network usageGPU support is experimentalIntel GPU monitoring is only supported for Broadwell and later GPUs; and does not support VRAM, power, or temperature monitoringWhen using Linux Mint/Cinnamon, launched applications may not show up in the "Applications" section (Upstream issue: https://github.com/linuxmint/cinnamon/issues/12015),|,https://flathub.org/apps/io.missioncenter.MissionCenter,|,80,|,$HOME/.var/app/io.missioncenter.MissionCenter,|,%URLPath%/Mission.Center.(Flatpak)_v1.0_LLApp.tar,|,%DBPath%/Mission.Center.(Flatpak)_v1.0_LLApp.tar,|,,|,%DBPath%/.lldb/missioncenter(flatpak)llapp.png,|,412,|,%DBPath%/.lldb/missioncenter(flatpak)llapp.jpg,|,%DBPath%/.lldb/missioncenter(flatpak)llapp.png,|,,|,internetrequired noinstall,|,,|,,|,,|,0,|,,|,,|,0,|,v0.5.2,|,,|,,|,,|,19000,|,,|,,|,,|,,|,$HOME/.var/app/io.missioncenter.MissionCenter,|,,|,,|,,|,,|,F,|,F,|,,|,,|,,|,,|,