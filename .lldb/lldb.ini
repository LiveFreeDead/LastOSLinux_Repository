000371,|,F,|,LLApp,|,T,|,,|,False,|,False,|,False,|,,|,,|,,|,Apply NTFS-3G,|,v0.1,|,System;,|,By default Linux Mint v22 uses the newer NTFS systems, but this is known to disable accessing drives that have the dirty bit set (including USB sticks), so by simply unpluging the USB at the wrong time will make the NTFS disk unreadable until you boot into windows and run chkdsk or use the Tools context menu.This ntfs-3g skips checking the dirty bit allowing access, many people had been using this driver for years without suffering any data loss because of it, so this offers an alternative if you want it.,|,https://forums.linuxmint.com/viewtopic.php?p=2521811#p2521811,|,5,|,/nonething,|,%URLPath%/Apply.NTFS-3G_v0.1_LLApp.tar,|,%DBPath%/Apply.NTFS-3G_v0.1_LLApp.tar,|,,|,%DBPath%/.lldb/applyntfs-3gllapp.png,|,360,|,,|,%DBPath%/.lldb/applyntfs-3gllapp.png,|,,|,noinstall,|,,|,,|,,|,0,|,,|,,|,0,|,,|,,|,,|,,|,20,|,,|,,|,,|,,|,/nonething,|,,|,,|,,|,,|,F,|,F,|,,|,,|,,|,,|,,|,,|,True,|,,|,,|,,|,,|,applyntfs-3gllapp,|,,|,
