000459,|,F,|,LLApp,|,T,|,,|,False,|,False,|,False,|,,|,,|,,|,VirtualBox,|,v7.1.4-165100,|,VirtualMachine;,|,VirtualBox is a powerful virtualization product for enterprise as well as home use. Not only is VirtualBox an extremely feature rich, high performance product for enterprise customers, it is also the only professional solution that is freely available as Open Source Software under the terms of the GNU General Public License (GPL).Presently, VirtualBox runs on Windows, Linux, Macintosh and OpenSolaris hosts and supports a large number of guest operating systems including but not limited to Windows (NT 4.0, 2000, XP, Server 2003, Vista, Windows 7, 8, 8.1, and 10), DOS/Windows 3.x, Linux (2.4 and 2.6), Solaris and OpenSolaris, and OpenBSD.VirtualBox is being actively developed with frequent releases and has an ever growing list of features, supported guest operating systems and platforms it runs on. VirtualBox is a community effort backed by a dedicated company: everyone is encouraged to contribute while Sun ensures the product always meets professional quality criteria.This version doesn't include the extpack as I don't use those features anyway, I do explain in the script how to add them if you need to though (it does ask for sudo password twice if used).The Guest Tools ISO can be download from https://download.virtualbox.org/virtualbox/* The Local version is the deb version and will not install over the previous .run version, you must uninstall it first.,|,https://www.virtualbox.org/wiki/Testbuilds|https://download.virtualbox.org/virtualbox/|https://download.virtualbox.org/virtualbox/7.1.2/,|,80,|,%AppPath%,|,%URLPath%/VirtualBox_v7.1.4-165100_Online_x64+x86_LLApp.tar,|,%DBPath%/VirtualBox_v7.1.4-165100_Online_x64+x86_LLApp.tar,|,,|,%DBPath%/.lldb/virtualboxllapp.png,|,448,|,%DBPath%/.lldb/virtualboxllapp.jpg,|,%DBPath%/.lldb/virtualboxllapp.png,|,,|,internetrequired noinstall,|,,|,,|,,|,4,|,,|,,|,3,|,,|,,|,,|,Glenn,|,186588,|,,|,,|,,|,,|,%AppPath%,|,,|,,|,,|,,|,F,|,F,|,,|,,|,,|,,|,,|,,|,True,|,,|,All-Linux,|,All,|,x86 + x64,|,virtualboxllapp,|,,|,
