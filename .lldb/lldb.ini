000380,|,F,|,LLApp,|,T,|,,|,False,|,False,|,False,|,,|,,|,,|,Calibre (Flatpak),|,1.0,|,eBook;,|,The one stop solution to all your e-book needs.You can use calibre to catalog your books, fetch metadata for them automatically, convert them from and to all the various e-book formats, send them to your e-book reader devices, read the books on your computer, edit the books in a dedicated e-book editor and even make them available over the network with the built-in Content server. You can also download news and periodicals in e-book format from over a thousand different news and magazine websites.,|,https://flathub.org/apps/com.calibre_ebook.calibre,|,80,|,$HOME/.var/app/com.calibre_ebook.calibre,|,%URLPath%/Calibre.(Flatpak)_1.0_LLApp.tar,|,%DBPath%/Calibre.(Flatpak)_1.0_LLApp.tar,|,,|,%DBPath%/.lldb/calibre(flatpak)llapp.png,|,369,|,%DBPath%/.lldb/calibre(flatpak)llapp.jpg,|,%DBPath%/.lldb/calibre(flatpak)llapp.png,|,,|,internetrequired noinstall,|,,|,,|,,|,0,|,,|,,|,0,|,v7.18.0,|,,|,,|,,|,556300,|,,|,,|,,|,,|,$HOME/.var/app/com.calibre_ebook.calibre,|,,|,,|,,|,,|,F,|,F,|,,|,,|,,|,,|,,|,,|,True,|,,|,,|,,|,,|,calibre(flatpak)llapp,|,,|,
000381,|,F,|,LLApp,|,T,|,,|,False,|,False,|,False,|,,|,,|,,|,Calligra Suite (Flatpak),|,v1.0,|,Office;,|,Calligra Suite is an office and graphic art suite by KDE. It contains applications for word processing, spreadsheets, presentation, vector graphics, and editing databases.Calligra Words is an intuitive word processor application with desktop publishing features. With it, you can create informative and attractive documents with ease. Calligra Words makes adding images, charts etc to your documents effortless. It's as simple as dragging it onto the document.Calligra Stage is a powerful and easy to use presentation application.You can dazzle your audience with stunning slides containing images, videos, animation and more.Calligra Sheets is a fully-featured spreadsheet application. Use it to quickly create spreadsheets with formulas and charts, to calculate and organize your data.Karbon is a vector drawing application with an user interface that is easy to use, highly customizable and extensible. That makes Karbon a great application for users starting to explore the world of vector graphics as well as for artists wanting to create breathtaking vector art.KEXI is a visual database applications creator. It can be used for designing database applications, inserting and editing data, performing queries, and processing data. Forms can be created to provide a custom interface to your data. All database objects - tables, queries, forms, reports - are stored in the database, making it easy to share data and design.Plan is a project management application. It is intended for managing moderately large projects with multiple resources.To enable you to model your project adequately, Plan offers different types of task dependencies and timing constraints. The usual use case is to define your tasks, estimate the effort needed to perform each task, allocate resources and then let Plan schedule the tasks according to network and resource availability.BraindumpBraindump is an open source tool to dump and organize the content of your brain (ideas, drawings, images, texts...) to your computer.,|,https://calligra.org/,|,5,|,$HOME/.var/app/org.kde.calligra,|,%URLPath%/Calligra.Suite.(Flatpak)_v1.0_LLApp.tar,|,%DBPath%/Calligra.Suite.(Flatpak)_v1.0_LLApp.tar,|,,|,%DBPath%/.lldb/calligrasuite(flatpak)llapp.png,|,370,|,%DBPath%/.lldb/calligrasuite(flatpak)llapp.jpg,|,%DBPath%/.lldb/calligrasuite(flatpak)llapp.png,|,,|,internetrequired noinstall,|,,|,KDE,|,,|,4,|,,|,,|,2,|,v4.01,|,2024-09-26,|,,|,,|,150000,|,,|,,|,,|,,|,$HOME/.var/app/org.kde.calligra,|,,|,,|,,|,,|,F,|,F,|,,|,,|,,|,,|,,|,,|,True,|,,|,,|,,|,,|,calligrasuite(flatpak)llapp,|,,|,
