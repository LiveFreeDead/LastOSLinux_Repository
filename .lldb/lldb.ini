000384,|,F,|,LLApp,|,T,|,,|,False,|,False,|,False,|,,|,,|,,|,Conky,|,v1.1,|,System;,|,Conky is a system monitor software for the X Window System (Wayland support is a work in progress). It is available for GNU/Linux and FreeBSD. It is free software released under the terms of the GPL license. Conky is able to monitor many system variables including CPU, memory, swap, disk space, temperature, top, upload, download, system messages, and much more. It is extremely configurable, however, the configuration can be a little hard to understand. Conky is a fork of torsmo.* Write Cache is handy for seeing when a USB disk has finished being written to as Linux will use memory to cache what needs to be written and if you have a slow USB stick it may not unmount for minutes, this will hide when the cache is clear (safe to remove).More Themes:https://www.noobslab.com/2012/07/conky-collection-for-ubuntulinux.htmlhttps://www.pling.com/browse?cat=124&ord=latest,|,https://en.wikipedia.org/wiki/Conky_(software)|https://www.noobslab.com/2012/07/conky-collection-for-ubuntulinux.html|https://www.pling.com/browse?cat=124&ord=latest,|,5,|,/usr/lib/conky,|,%URLPath%/Conky_v1.1_LLApp.tar,|,%DBPath%/Conky_v1.1_LLApp.tar,|,,|,%DBPath%/.lldb/conkyllapp.svg,|,373,|,%DBPath%/.lldb/conkyllapp.jpg,|,%DBPath%/.lldb/conkyllapp.png,|,,|,internetrequired noinstall,|,,|,,|,,|,0,|,,|,,|,0,|,,|,,|,,|,,|,1,|,,|,,|,,|,,|,/usr/lib/conky,|,,|,,|,,|,,|,F,|,F,|,,|,,|,,|,,|,,|,,|,True,|,,|,,|,,|,,|,conkyllapp,|,,|,
