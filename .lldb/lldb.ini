000387,|,F,|,LLApp,|,T,|,,|,False,|,False,|,False,|,,|,,|,,|,DejaDup Backup (Flatpak),|,v1.0,|,Archiving;,|,Protect yourself from data lossDeja Dup is a simple backup tool. It hides the complexity of backing up the Right Way (encrypted, off-site, and regular) and uses duplicity as the backend.Support for local, remote, or cloud backup locations such as Google DriveSecurely encrypts and compresses your dataIncrementally backs up, letting you restore from any particular backupSchedules regular backupsIntegrates well into your GNOME desktopDeja Dup focuses on ease of use and recovering from personal, accidental data loss. If you need a full system backup or an archival program, you may prefer other backup apps.,|,https://apps.gnome.org/en-GB/DejaDup/|https://flathub.org/apps/org.gnome.DejaDup,|,5,|,$HOME/.var/app/org.gnome.DejaDup,|,%URLPath%/DejaDup.Backup.(Flatpak)_v1.0_LLApp.tar,|,%DBPath%/DejaDup.Backup.(Flatpak)_v1.0_LLApp.tar,|,,|,%DBPath%/.lldb/dejadupbackup(flatpak)llapp.png,|,376,|,%DBPath%/.lldb/dejadupbackup(flatpak)llapp.jpg,|,%DBPath%/.lldb/dejadupbackup(flatpak)llapp.png,|,,|,internetrequired noinstall,|,,|,,|,,|,0,|,,|,,|,0,|,v47.0,|,,|,,|,,|,89890,|,,|,,|,,|,,|,$HOME/.var/app/org.gnome.DejaDup,|,,|,,|,,|,,|,F,|,F,|,,|,,|,,|,,|,,|,,|,True,|,,|,,|,,|,,|,dejadupbackup(flatpak)llapp,|,,|,
000388,|,F,|,LLGame,|,T,|,,|,False,|,False,|,False,|,,|,,|,,|,Delores,|,v1.0,|,PuzzleGame;,|,Delores is back home and working as a photographer for the Nickel News. Thimbleweed Park hasn't changed at all in the year she's been away... or has it? Sample Ron Gilbert's new adventure game engine in this free prototype that uses "found art" from the award-winning Thimbleweed Park.The year is 1988. Adventure game developer Delores Edmund, on hiatus from her job at MMucasFlem Games, has returned to Thimbleweed Park for a quick vacation. While she's home, she's making some extra money as a photographer for the Thimbleweed Nickel News. Hey, game developers need to eat, too!Thimbleweed Park hasn't changed at all in the year since Delores has been away... or has it?...Since when is the S&D Diner a five-star establishment?...When did the PillowBear(TM) become all the rage?...Why is Ransome the Clown suddenly winning humanitarian awards?...How come no one seems to remember that dead body that turned up under the bridge a year ago?...Can Thimbleweed Park get any stranger?!.In a town like Thimbleweed Park, a side career in photojournalism is the least of your problems...Delores: A Thimbleweed Park Mini-Adventure started out as a prototype for Ron Gilbert's new point-and-click adventure game engine and grew into a fun little game. It is not a sequel to Thimbleweed Park and is probably missing all of the small bells and whistles that would make it a commercially viable game.This was a challenging game to make because we had to use almost exclusively "found art" from Thimbleweed Park to create all new puzzles. Also because we couldn't go outside IRL.As a thank you to our fans, we are releasing it for free as something you can have fun with in these odd times. You don't have to have played Thimbleweed Park to enjoy this mini-adventure. (But if you do enjoy it, why not check out Thimbleweed Park, hmm?)Key Features:Non-stop point-and-click fun!Return to Thimbleweed Park, the setting of the Best Adventure of 2017 award from Adventure Gamers and the Thank You for Not Still Living at Home award from Ron Gilbert's mom. (Or, visit Thimbleweed Park for the first time! No prior knowledge required to play!)Explore Main Street and solve puzzles to take pictures for Thimbleweed Park's hard-hitting newspaper. One of these days Natalie will get that Pulitzer, and it will be thanks to your help!Tackle increasingly difficult assignments as you get closer to figuring out what the heck is going on in Thimbleweed Park this time.Sample a new adventure game engine by Ron Gilbert, who created Lucasfilm's SCUMM engine and classic games Maniac Mansion and Monkey Island back in the day.,|,https://store.steampowered.com/app/1305720/Delores_A_Thimbleweed_Park_MiniAdventure/,|,5,|,%LLGames%/Delores_v1.0_LLGame/,|,%URLPath%/Delores_v1.0_LLGame.tar,|,%DBPath%/Delores_v1.0_LLGame.tar,|,,|,%DBPath%/.lldb/deloresllgame.png,|,377,|,%DBPath%/.lldb/deloresllgame.jpg,|,%DBPath%/.lldb/deloresllgame.png,|,,|,,|,,|,,|,,|,0,|,,|,,|,0,|,,|,,|,,|,,|,69760,|,Delores,|,,|,,|,PuzzleGame; AdventureGame; Game;,|,%LLGames%/Delores_v1.0_LLGame/,|,%LLGames%/Delores_v1.0_LLGame/Delores,|,,|,,|,,|,F,|,F,|,,|,%LLGames%/Delores_v1.0_LLGame/LLGame.png,|,,|,,|,,|,,|,False,|,,|,,|,,|,,|,deloresllgame,|,,|,
000389,|,F,|,ssApp,|,T,|,,|,False,|,False,|,False,|,,|,,|,,|,DirectX Runtimes 9.0c Complete,|,v9.29.1974,|,Drivers;,|,Microsoft DirectX is a collection of application programming interfaces (APIs) for handling tasks related to multimedia, especially game programming and video, on Microsoft platforms.Direct3D (the 3D graphics API within DirectX) is widely used in the development of video games for Microsoft Windows, Microsoft Xbox, and Microsoft Xbox 360. Direct3D is also used by other software applications for visualization and graphics tasks such as CAD/CAM engineering. As Direct3D is the most widely publicized component of DirectX, it is common to see the names "DirectX" and "Direct3D" used interchangeably.This DirectX redist installation includes all the latest and previously released DirectX runtimes. This includes D3DX, XInput, and Managed DirectX components. The DirectX runtime cannot be uninstalled so it is recommended to create a Restore Point before installing.* This version works properly with Windows 10.,|,http://www.microsoft.com/downloads/details.aspx?displaylang=en&FamilyID=3b170b25-abab-4bc3-ae91-50ceb6d8fa8d|http://en.wikipedia.org/wiki/DirectX,|,4,|,$HOME/.wine/drive_c/Program Files/MS.DirectX.Runtimes,|,%URLPath%/DirectX.Runtimes.9.0c.Complete_v9.29.1974_ssApp.apz,|,%DBPath%/DirectX.Runtimes.9.0c.Complete_v9.29.1974_ssApp.apz,|,,|,%DBPath%/.lldb/directxruntimes9.0ccompletessapp.png,|,378,|,%DBPath%/.lldb/directxruntimes9.0ccompletessapp.jpg,|,%DBPath%/.lldb/directxruntimes9.0ccompletessapp.png,|,,|,,|,Runtime|Windows|Microsoft,|,Microsoft,|,,|,3,|,,|,,|,2,|,,|,2011-04-18,|,,|,LastOS,|,0,|,,|,,|,,|,,|,$HOME/.wine/drive_c/Program Files/MS.DirectX.Runtimes,|,,|,,|,,|,,|,F,|,F,|,,|,,|,,|,,|,,|,,|,False,|,,|,,|,,|,,|,directxruntimes9.0ccompletessapp,|,,|,
000390,|,F,|,LLApp,|,T,|,,|,False,|,False,|,False,|,,|,,|,,|,Discord (Flatpak),|,v1.0,|,Chat;,|,Messaging, voice and video clientDiscord is a free all in one messaging, voice, and video client thats available on your computer and phone.Whether you're part of a school club, gaming group, worldwide art community, or just a handful of friends that want to spend time together, Discord makes it easy to talk every day and hang out more often.Talk to your friends with messaging, voice, and video in a "Direct Message" (1 other person), group chat (up to 10 people), or a multi-channel server (practically infinite maximum members).Discord servers are organized into topic-based channels where you can collaborate, share, and just talk about your day without clogging up a group chat.Grab a seat in a voice channel when you're free. Friends in your server can see you're around and instantly pop in to talk without having to call.Get a community of any size running with moderation tools and custom member access. Give members special powers, set up private channels, and more.Low-latency voice and video feels like you're in the same room. Wave hello over video, watch friends stream their games, or gather up and have a drawing session with screen share.Available on Linux, macOS, Windows, iOS, Android, and your web browser.Discord is written in Javascript, React, Elixir, and Rust. The desktop application uses the electron framework.The flatpak version runs in a sandbox to provide better safety and privacy for users. However, this sandboxing prevents the following features from working out of the box: Game Activity, Unrestricted File Access, Rich Presence. Check the README in the Github repo for details.,|,https://flathub.org/apps/com.discordapp.Discord,|,5,|,$HOME/.var/app/com.discordapp.Discord,|,%URLPath%/Discord.(Flatpak)_v1.0_LLApp.tar,|,%DBPath%/Discord.(Flatpak)_v1.0_LLApp.tar,|,,|,%DBPath%/.lldb/discord(flatpak)llapp.png,|,379,|,%DBPath%/.lldb/discord(flatpak)llapp.j