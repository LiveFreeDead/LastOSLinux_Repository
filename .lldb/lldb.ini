000431,|,F,|,ppApp,|,T,|,,|,False,|,False,|,False,|,,|,,|,,|,Resource Hacker,|,v5.2.4.386,|,Development;,|,Resource Hacker is a freeware utility to view, modify, rename, add, delete and extract resources in 32bit & 64bit Windows executables and resource files (*.res). It incorporates an internal resource script compiler and decompiler and works on all Windows operating systems.Viewing Resources: Cursor, Icon, Bitmap, GIF, AVI, and JPG resource images can be viewed. WAV and MIDI audio resources can be played. Menus, Dialogs, MessageTables, StringTables, Accelerators, Delphi Forms, and VersionInfo resources can be viewed as decompiled resource scripts. Menus and Dialogs can also be viewed as they would appear in a running application.Saving Resources: Resources can be saved as image files (*.ico, *.bmp etc), as script files (*.rc), as binary resource files (*.res), or as untyped binary files (*.bin).Modifying Resources: Resources can be modified by replacing the resource with a resource located in another file (*.ico, *.bmp, *.res etc) or by using the internal resource script compiler (for menus, dialogs etc). Dialog controls can also be visually moved and/or resized by clicking and dragging the respective dialog controls prior to recompiling with the internal compiler.Adding Resources: Resources can be added to an application by copying them from external resource files (*.res).Deleting Resources: Most compilers add resources into applications which are never used by the application. Removing unused resources can reduce an application's size.[This ppApp creates a "Send To" context menu entry, making it easy to right-click and open files.],|,http://www.angusj.com/resourcehacker,|,5,|,%ppApps%/Resource.Hacker,|,%URLPath%/Resource.Hacker_v5.2.4.386_ppApp.apz,|,%DBPath%/Resource.Hacker_v5.2.4.386_ppApp.apz,|,,|,%DBPath%/.lldb/resourcehackerppapp.png,|,420,|,%DBPath%/.lldb/resourcehackerppapp.jpg,|,%DBPath%/.lldb/resourcehackerppapp.png,|,,|,keepall|sendto,|,Resource|Utility|File Utility|Modding,|,Angus Johnson,|,,|,0,|,,|,,|,2,|,5.2.4.386,|,2023-10-30,|,,|,,|,7823118,|,Resource Hacker,|,Edit various system files like dll, exe, cpl, etc. Now includes support for 64-bit executables and PNG images.,|,Resource Hacker is a freeware utility to view, modify, rename, add, delete and extract resources in 32bit & 64bit Windows executables and resource files (*.res). It incorporates an internal resource script compiler and decompiler and works on all Windows operating systems.Viewing Resources: Cursor, Icon, Bitmap, GIF, AVI, and JPG resource images can be viewed. WAV and MIDI audio resources can be played. Menus, Dialogs, MessageTables, StringTables, Accelerators, Delphi Forms, and VersionInfo resources can be viewed as decompiled resource scripts. Menus and Dialogs can also be viewed as they would appear in a running application.Saving Resources: Resources can be saved as image files (*.ico, *.bmp etc), as script files (*.rc), as binary resource files (*.res), or as untyped binary files (*.bin).Modifying Resources: Resources can be modified by replacing the resource with a resource located in another file (*.ico, *.bmp, *.res etc) or by using the internal resource script compiler (for menus, dialogs etc). Dialog controls can also be visually moved and/or resized by clicking and dragging the respective dialog controls prior to recompiling with the internal compiler.Adding Resources: Resources can be added to an application by copying them from external resource files (*.res).Deleting Resources: Most compilers add resources into applications which are never used by the application. Removing unused resources can reduce an application's size.[This ppApp creates a "Send To" context menu entry, making it easy to right-click and open files.],|,Development Tools;,|,%ppApps%/Resource.Hacker,|,ResourceHacker.exe,|,,|,,|,,|,F,|,F,|,,|,,|,,|,,|,,|,,|,False,|,,|,,|,,|,,|,resourcehackerppapp,|,,|,
