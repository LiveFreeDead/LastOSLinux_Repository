000418,|,F,|,LLGame,|,T,|,,|,False,|,False,|,False,|,,|,,|,,|,Lode Runner Online - Mad Monks Revenge,|,v1.0,|,PlatformGame;,|,This project is a fan made cross-platform clone of Lode Runner Online: The Mad Monks' Revenge. We played Lode Runner on and off over the years, but when it no longer played nice with modern OS's, we decided rather than just not play it and remember it how it was, we'd re-create it!We've thrown in a few new features and some tweaks here and there but most importantly - same graphics, same gameplay, and even the same bugs! You can follow our progress on our dev blog.Lode Runner was created by the legendary Doug E. Smith in 1983. Lode Runner Online: The Mad Monks' Revenge (sequel to Lode Runner: The Legend Returns, both developed by Presage Software) was released by Sierra for Windows and Mac in 1995.,|,https://mmr.quarkrobot.com/,|,5,|,%LLGames%/Lode.Runner.Online.-.Mad.Monks.Revenge_v1.0_LLGame/,|,%URLPath%/Lode.Runner.Online.-.Mad.Monks.Revenge_v1.0_LLGame.tar,|,%DBPath%/Lode.Runner.Online.-.Mad.Monks.Revenge_v1.0_LLGame.tar,|,,|,%DBPath%/.lldb/loderunneronline-madmonksrevengellgame.png,|,407,|,%DBPath%/.lldb/loderunneronline-madmonksrevengellgame.jpg,|,%DBPath%/.lldb/loderunneronline-madmonksrevengellgame.png,|,,|,,|,,|,,|,,|,0,|,,|,,|,0,|,,|,,|,,|,,|,26496,|,Lode Runner Online - Mad Monks Revenge,|,,|,,|,PlatformGame; Game;,|,%LLGames%/Lode.Runner.Online.-.Mad.Monks.Revenge_v1.0_LLGame/,|,%LLGames%/Lode.Runner.Online.-.Mad.Monks.Revenge_v1.0_LLGame/start.sh,|,,|,,|,,|,F,|,F,|,,|,%LLGames%/Lode.Runner.Online.-.Mad.Monks.Revenge_v1.0_LLGame/LLGame.png,|,,|,,|,,|,,|,False,|,,|,,|,,|,,|,loderunneronline-madmonksrevengellgame,|,,|,
000419,|,F,|,LLApp,|,T,|,,|,False,|,False,|,False,|,,|,,|,,|,LosslessCut (Flatpak),|,v1.0,|,Video;,|,Simple and ultra fast cross platform tool for lossless trimming/cutting of video and audio files. Great for saving space by rough cutting your large video files taken from a video camera, GoPro, drone, etc. It lets you quickly extract the good parts from your videos and discard many gigabytes of data without doing a slow re-encode and thereby losing quality. It extremely fast because it does an almost direct data copy. It is fueled by the awesome ffmpeg (included) for doing the grunt work. It also features some other lossless operations on videos.,|,https://github.com/mifi/lossless-cut,|,80,|,$HOME/.var/app/no.mifi.losslesscut,|,%URLPath%/LosslessCut.(Flatpak)_v1.0_LLApp.tar,|,%DBPath%/LosslessCut.(Flatpak)_v1.0_LLApp.tar,|,,|,%DBPath%/.lldb/losslesscut(flatpak)llapp.png,|,408,|,%DBPath%/.lldb/losslesscut(flatpak)llapp.jpg,|,%DBPath%/.lldb/losslesscut(flatpak)llapp.png,|,,|,internetrequired noinstall,|,,|,,|,,|,0,|,,|,,|,0,|,v3.55.1,|,,|,,|,,|,269000,|,,|,,|,,|,,|,$HOME/.var/app/no.mifi.losslesscut,|,,|,,|,,|,,|,F,|,F,|,,|,,|,,|,,|,,|,,|,True,|,,|,,|,,|,,|,losslesscut(flatpak)llapp,|,,|,
000420,|,F,|,LLApp,|,T,|,,|,False,|,False,|,False,|,,|,,|,,|,Merkuro,|,v1.0,|,Calendar;,|,* Note: This installs the KDE runtimes, that will take up more disk space than just the main application, if you use other KDE apps this will happen anyway. It also means there will be a slight delay opening these apps.Merkuro Calendar is a calendar application that allows you to manage your tasks and events. Kalendar supports both local calendars as well as a multitude of online calendars: Nextcloud, Google(R) Calendar, Outlook(R), Caldav, and many more.Merkuro gives you many ways to interact with your events. The month view provides an overview of the entire month; the week view presents a detailed hour-by-hour overview of your week; and the schedule view lists all of your upcoming events so that you can easily and quickly plan ahead.A tasks view is also available, making it possible for you to manage your tasks and subtasks with Merkuro's powerful tree view and its customisable filtering capabilities.Merkuro was built with the idea to be usable on desktop, on mobile and everything in between.,|,https://apps.kde.org/merkuro.calendar/,|,5,|,/usr/share/doc/merkuro,|,%URLPath%/Merkuro_v1.0_LLApp.tar,|,%DBPath%/Merkuro_v1.0_LLApp.tar,|,,|,%DBPath%/.lldb/merkurollapp.png,|,409,|,%DBPath%/.lldb/merkurollapp.jpg,|,%DBPath%/.lldb/merkurollapp.png,|,,|,internetrequired noinstall,|,,|,,|,,|,0,|,,|,,|,0,|,,|,,|,,|,,|,92,|,,|,,|,,|,,|,/usr/share/doc/merkuro,|,,|,,|,,|,,|,F,|,F,|,,|,,|,,|,,|,,|,,|,True,|,,|,,|,,|,,|,merkurollapp,|,,|,
000421,|,F,|,LLApp,|,T,|,,|,False,|,False,|,False,|,,|,,|,,|,Microsoft Edge,|,v1.0,|,Internet;,|,Microsoft Edge (or simply nicknamed Edge) is a proprietary cross-platform web browser created by Microsoft. Released in 2015 along with both Windows 10 and Xbox One, it was initially built with Microsoft's own proprietary browser engine, EdgeHTML, and their Chakra JavaScript engine. Later on, it was ported to Android and iOS as a fork of Google's Chromium open-source project. In late 2018, Microsoft announced it would completely rebuild Edge as a Chromium-based browser with Blink and V8 engines, which allowed the browser to be ported to macOS. The new Edge was publicly released in January 2020, and on Xbox platforms in 2021. Microsoft has since terminated security support for the original browser (now referred to as Microsoft Edge Legacy).,|,https://www.microsoft.com/en-us/edge,|,5,|,/opt/microsoft/msedge,|,%URLPath%/Microsoft.Edge_v1.0_LLApp.tar,|,%DBPath%/Microsoft.Edge_v1.0_LLApp.tar,|,,|,%DBPath%/.lldb/microsoftedgellapp.png,|,410,|,%DBPath%/.lldb/microsoftedgellapp.jpg,|,%DBPath%/.lldb/microsoftedgellapp.png,|,,|,internetrequired noinstall,|,,|,Microsoft,|,,|,4,|,,|,,|,2,|,,|,,|,,|,,|,164,|,,|,,|,,|,,|,/opt/microsoft/msedge,|,,|,,|,,|,,|,F,|,F,|,,|,,|,,|,,|,,|,,|,True,|,,|,,|,,|,,|,microsoftedgellapp,|,,|,
000422,|,F,|,ssApp,|,T,|,,|,False,|,False,|,False,|,,|,,|,,|,Microsoft Visual Runtimes AIO Linux,|,2024.06.10,|,System;,|,This ssApp will install the 2005, 2008, 2010, 2012, 2013, and 2022 packages of the Microsoft Visual C++ runtimes. A collection of additional Visual Basic, older Visual C runtimes, and additional runtimes (contained in the 'extra.exe' installer) will also be installed for maximum compatiblity. On 32-bit OS only the 32-bit runtimes will be installed, whereas on a 64-bit OS both the 32-bit and 64-bit runtimes will be installed.This ssApp contains the following Visual Runtime versions:- VC++ 2005 x86: 8.0.61187- VC++ 2005 x64: 8.0.61186- VC++ 2008 x86: 9.0.30729.7523- VC++ 2008 x64: 9.0.30729.7523- VC++ 2010 x86: 10.0.40219.473- VC++ 2010 x64: 10.0.40219.473- VC++ 2012 x86: 11.0.61135- VC++ 2012 x64: 11.0.61135- VC++ 2013 x86: 12.0.40664- VC++ 2013 x64: 12.0.40664- VC++ 2022 x86: 14.40.33810.0- VC++ 2022 x64: 14.40.33810.0Always make sure to have all VC Runtimes installed on your computer because many programs depend on these to function. Many program installers have runtime installers included, which is why installing these runtimes is especially important when using ppApps as these won't always come with included runtimes.VC++ 2022 runtimes are binary compatible with VC++ 2015-2019 and cover all VS 2015-2022 programs.* I've edited the extra.exe so it doesn't regsvr anymore as it was failing on linux.,|,http://www.microsoft.com|https://rebrand.ly/vcredist,|,5,|,$HOME/.wine/drive_c/Program Files/Microsoft.Visual.Runtimes.AIO,|,%URLPath%/Microsoft.Visual.Runtimes.AIO.Linux_2024.06.10_ssApp.apz,|,%DBPath%/Microsoft.Visual.Runtimes.AIO.Linux_2024.06.10_ssApp.apz,|,,|,%DBPath%/.lldb/microsoftvisualruntimesaiolinuxssapp.png,|,411,|,%DBPath%/.lldb/microsoftvisualruntimesaiolinuxssapp.jpg,|,%DBPath%/.lldb/microsoftvisualruntimesaiolinuxssapp.png,|,,|,,|,Runtime|Microsoft,|,Microsoft,|,,|,0,|,,|,,|,2,|,Microsoft Visual Runtimes AIO,|,2024-