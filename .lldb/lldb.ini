000397,|,F,|,LLApp,|,T,|,,|,False,|,False,|,False,|,,|,,|,,|,FreeFileSync (Flatpak),|,v1.0,|,Archiving;,|,Visual folder comparison and synchronizationFreeFileSync is a folder comparison and synchronization software that creates and manages backup copies of your important files. Instead of copying every file every time, FreeFileSync determines the differences between a source and a target folder and transfers only the minimum amount of data needed.NOTE: FreeFileSync allows you to open files in external applications or run custom scripts. However, when sandboxed as Flatpak, external applications or scripts from your host system are not accessible. If you want to give FreeFileSync access to your host applications/commands, run this command in terminal to give it access to your session DBus: flatpak override --user --socket=session-bus org.freefilesync.FreeFileSync (Or you can use Flatseal to configure this permission). Now you can run any app/command, if you prefix it with "flatpak-spawn --host", i.e.: flatpak-spawn --host mycommand arguments,|,https://flathub.org/apps/org.freefilesync.FreeFileSync,|,5,|,$HOME/.var/app/org.freefilesync.FreeFileSync,|,%URLPath%/FreeFileSync.(Flatpak)_v1.0_LLApp.tar,|,%DBPath%/FreeFileSync.(Flatpak)_v1.0_LLApp.tar,|,,|,%DBPath%/.lldb/freefilesync(flatpak)llapp.png,|,386,|,%DBPath%/.lldb/freefilesync(flatpak)llapp.jpg,|,%DBPath%/.lldb/freefilesync(flatpak)llapp.png,|,,|,internetrequired noinstall,|,,|,,|,,|,0,|,,|,,|,0,|,v13.7,|,,|,,|,,|,88090,|,,|,,|,,|,,|,$HOME/.var/app/org.freefilesync.FreeFileSync,|,,|,,|,,|,,|,F,|,F,|,,|,,|,,|,,|,,|,,|,True,|,,|,,|,,|,,|,freefilesync(flatpak)llapp,|,,|,
