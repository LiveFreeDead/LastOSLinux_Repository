000447,|,F,|,ppApp,|,T,|,,|,False,|,False,|,False,|,,|,,|,,|,WinSCP,|,v6.1.1,|,Internet;,|,WinSCP Portable is a reliable open source SFTP and FTP client that allows safe copying of files between a local and a remote computer. Copy file between a local computer and remote servers using FTP, FTPS, SCP, SFTP, WebDAV, or S3 file transfer protocols.It is integrated with Windows and fully supports drag n' drop, URL, shortcut icons, U3, SFTP, plain old FTP protocol, SCP protocols over SSH-1/2, and Legacy SCP protocol. You have access to batch file scripting and command-line interface as an alternative to the graphical user interface. Legacy SCP protocol is also supported. Its main function is safe copying of files between a local and a remote computer.When using WinSCP Portable, it is possible to connect to an SSH (Secure Shell) server with SFTP (SSH File Transfer Protocol) or SCP (Secure Copy Protocol) service or to an FTP (File Transfer Protocol) server.For SFTP, the only requirement beyond the server requirements above is to run SFTP on the server.,|,https://winscp.net/eng/index.php|https://winscp.net/eng/docs/portable,|,5,|,%ppApps%/WinSCP,|,%URLPath%/WinSCP_v6.1.1_ppApp.apz,|,%DBPath%/WinSCP_v6.1.1_ppApp.apz,|,,|,%DBPath%/.lldb/winscpppapp.png,|,436,|,%DBPath%/.lldb/winscpppapp.jpg,|,%DBPath%/.lldb/winscpppapp.png,|,,|,keepall,|,Download Manager|Server|Internet|FTP,|,WinSCP.net,|,,|,0,|,,|,,|,2,|,6.1.1,|,2023-06-27,|,,|,,|,25590547,|,WinSCP,|,WinSCP Portable is a reliable open source SFTP and FTP client that allows safe copying of files between a local and a remote computer.,|,WinSCP Portable is a reliable open source SFTP and FTP client that allows safe copying of files between a local and a remote computer. Copy file between a local computer and remote servers using FTP, FTPS, SCP, SFTP, WebDAV, or S3 file transfer protocols.It is integrated with Windows and fully supports drag n' drop, URL, shortcut icons, U3, SFTP, plain old FTP protocol, SCP protocols over SSH-1/2, and Legacy SCP protocol. You have access to batch file scripting and command-line interface as an alternative to the graphical user interface. Legacy SCP protocol is also supported. Its main function is safe copying of files between a local and a remote computer.When using WinSCP Portable, it is possible to connect to an SSH (Secure Shell) server with SFTP (SSH File Transfer Protocol) or SCP (Secure Copy Protocol) service or to an FTP (File Transfer Protocol) server.For SFTP, the only requirement beyond the server requirements above is to run SFTP on the server.,|,Internet Download Manager;,|,%ppApps%/WinSCP,|,WinSCP.exe,|,,|,,|,,|,F,|,F,|,,|,,|,,|,,|,,|,,|,False,|,,|,,|,,|,,|,winscpppapp,|,,|,
