000409,|,F,|,LLApp,|,T,|,,|,False,|,False,|,False,|,,|,,|,,|,Inkscape (Flatpak),|,1.0,|,VectorGraphics;,|,Vector Graphics EditorA Free and open source vector graphics editor. It offers a rich set of features and is widely used for both artistic and technical illustrations such as cartoons, clip art, logos, typography, diagramming and flowcharting.It uses vector graphics to allow for sharp printouts and renderings at unlimited resolution and is not bound to a fixed number of pixels like raster graphics. Inkscape uses the standardized SVG file format as its main format, which is supported by many other applications including web browsers.Inkscape supports many advanced SVG features (markers, clones, alpha blending, etc.) and great care is taken in designing a streamlined interface. It is very easy to edit nodes, perform complex path operations, trace bitmaps and much more. We also aim to maintain a thriving user and developer community by using open, community-oriented development.,|,https://flathub.org/apps/org.inkscape.Inkscape,|,80,|,$HOME/.var/app/org.inkscape.Inkscape,|,%URLPath%/Inkscape.(Flatpak)_1.0_LLApp.tar,|,%DBPath%/Inkscape.(Flatpak)_1.0_LLApp.tar,|,,|,%DBPath%/.lldb/inkscape(flatpak)llapp.png,|,398,|,%DBPath%/.lldb/inkscape(flatpak)llapp.jpg,|,%DBPath%/.lldb/inkscape(flatpak)llapp.png,|,,|,internetrequired noinstall,|,,|,,|,,|,0,|,,|,,|,0,|,v1.3.2,|,,|,,|,,|,291540,|,,|,,|,,|,,|,$HOME/.var/app/org.inkscape.Inkscape,|,,|,,|,,|,,|,F,|,F,|,,|,,|,,|,,|,,|,,|,True,|,,|,,|,,|,,|,inkscape(flatpak)llapp,|,,|,
000410,|,F,|,LLGame,|,T,|,,|,False,|,False,|,False,|,,|,,|,,|,Inventioneers,|,v1.0,|,SimulationGame;,|,Be Creative!In this game you can create your own crazy, fun inventions! With the help of the Inventioneers, our tiny helpers with unique characteristics, you can invent fun, creative and often quite weird inventions. A lot of inventions are included in the game, the more you solve the more parts you receive for your own inventions!Learn About Physics!Inventioneers is an outstanding tool for learning about realtime physics and the science behind different features like air, fire, magnetism and jumping bunnies. What you can do with the tool is virtually endless.Share With Friends!Invite friends to share their crazy inventions and you can share yours too!8 Chapters With InventionsHelp pirates in the tropics and launch rockets in the backyard chapter. The night inventions will have you zapping laser trough a maze of mirrors to ignite bombs. Help penguins in the winter and teleport potions in the fairy tale chapter. Inventioneers have 8 chapters with a total of 112 inventions. If that isn't enough you can create your own inventions and share them with your friends.8 chapters with a total of 112 new inventions!Create! - A fully working tool to create your own inventionsShare up to 16 inventions with your friends!100+ objects18 characters that you can help8 Inventioneers with unique features - Windy, Blaze, Sporty, Zappy, Bunny, Magneta, Freezy and Maggie,|,https://store.steampowered.com/app/395580/Inventioneers/,|,5,|,%LLGames%/Inventioneers_v1.0_LLGame/,|,%URLPath%/Inventioneers_v1.0_LLGame.tar,|,%DBPath%/Inventioneers_v1.0_LLGame.tar,|,,|,%DBPath%/.lldb/inventioneersllgame.png,|,399,|,%DBPath%/.lldb/inventioneersllgame.jpg,|,%DBPath%/.lldb/inventioneersllgame.png,|,,|,,|,,|,,|,,|,0,|,,|,,|,0,|,,|,,|,,|,,|,256,|,Inventioneers,|,,|,,|,SimulationGame; Game;,|,%LLGames%/Inventioneers_v1.0_LLGame/,|,%LLGames%/Inventioneers_v1.0_LLGame/Inventioneers.x86,|,,|,,