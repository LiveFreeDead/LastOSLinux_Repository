000425,|,F,|,LLApp,|,T,|,,|,False,|,False,|,False,|,,|,,|,,|,OBS Studio,|,1.0,|,Video;,|,Free and open source software for video capturing, recording, and live streaming.Features:High performance real time video/audio capturing and mixing. Create scenes made up of multiple sources including window captures, images, text, browser windows, webcams, capture cards and more.Set up an unlimited number of scenes you can switch between seamlessly via custom transitions.Intuitive audio mixer with per-source filters such as noise gate, noise suppression, and gain. Take full control with VST plugin support.Powerful and easy to use configuration options. Add new Sources, duplicate existing ones, and adjust their properties effortlessly.Streamlined Settings panel gives you access to a wide array of configuration options to tweak every aspect of your broadcast or recording.Modular 'Dock' UI allows you to rearrange the layout exactly as you like. You can even pop out each individual Dock to its own window.Create Professional Productions:Choose from a number of different and customizable transitions for when you switch between your scenes or add your own stinger video files.Set hotkeys for nearly every sort of action, such as switching between scenes, starting/stopping streams or recordings, muting audio sources, push to talk, and more.Studio Mode lets you preview your scenes and sources before pushing them live. Adjust your scenes and sources or create new ones and ensure they're perfect before your viewers ever see them.Get a high level view of your production using the Multiview. Monitor 8 different scenes and easily cue or transition to any of them with merely a single or double click.,|,https://obsproject.com/forum/threads/ubuntu-ppa-installation-instructions.16495/,|,5,|,/usr/share/obs,|,%URLPath%/OBS.Studio_1.0_LLApp.tar,|,%DBPath%/OBS.Studio_1.0_LLApp.tar,|,,|,%DBPath%/.lldb/obsstudiollapp.png,|,414,|,%DBPath%/.lldb/obsstudiollapp.jpg,|,%DBPath%/.lldb/obsstud